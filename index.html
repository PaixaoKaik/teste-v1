<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Final ESP32-C3</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .box { background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 10px; border: 1px solid #444; }
        #bar { height: 15px; width: 0%; background: #00ff00; border-radius: 5px; transition: width 0.1s; }
        button { padding: 20px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
        .active { background: #28a745 !important; }
    </style>
</head>
<body>
    <h1>Validador ESP32-C3</h1>
    <button id="btnConn" onclick="conectar()">CONECTAR VIA BLUETOOTH</button>

    <div class="box">GPS: <span id="gps">Aguardando sinal...</span></div>
    <div class="box">Botão: <b id="btn">SOLTO</b></div>
    <div class="box">Áudio (Nível):<div style="background:#000; width:100%; margin-top:10px;"><div id="bar"></div></div></div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UUIDS = {
            gps: "6e400002-b5a3-f393-e0a9-e50e24dcca9e",
            btn: "6e400003-b5a3-f393-e0a9-e50e24dcca9e",
            aud: "6e400004-b5a3-f393-e0a9-e50e24dcca9e"
        };

        let audioCtx, proximoTempo = 0;

        async function conectar() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 11025 });
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                // GPS
                const gpsChar = await service.getCharacteristic(UUIDS.gps);
                await gpsChar.startNotifications();
                gpsChar.addEventListener('characteristicvaluechanged', e => {
                    document.getElementById('gps').innerText = new TextDecoder().decode(e.target.value);
                });

                // Botão
                const btnChar = await service.getCharacteristic(UUIDS.btn);
                await btnChar.startNotifications();
                btnChar.addEventListener('characteristicvaluechanged', e => {
                    // Obtém o valor do primeiro byte
                    const valor = e.target.value.getUint8(0);
                    const el = document.getElementById('btn');
                    el.innerText = valor === 1 ? "PRESSIONADO" : "SOLTO";
                    el.style.color = valor === 1 ? "#00ff00" : "#ff4444";
                });

                // Áudio
                const audChar = await service.getCharacteristic(UUIDS.aud);
                await audChar.startNotifications();
                audChar.addEventListener('characteristicvaluechanged', e => {
                    tocar(new Uint8Array(e.target.value.buffer));
                });

                document.getElementById('btnConn').innerText = "CONECTADO";
                document.getElementById('btnConn').classList.add('active');
                
            } catch (err) {
                console.error(err);
                alert("Erro: " + err.message);
            }
        }

        function tocar(data) {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, data.length, 11025);
            const channel = buffer.getChannelData(0);
            let volumeTotal = 0;

            for (let i = 0; i < data.length; i++) {
                // Converte de 0-255 para -1.0 a 1.0
                const sample = ((data[i] - 128) / 128) * 4.0; // Ganho de 4x
                channel[i] = sample;
                volumeTotal += Math.abs(sample);
            }

            // Atualiza barra de volume
            const media = volumeTotal / data.length;
            document.getElementById('bar').style.width = Math.min(media * 150, 100) + "%";

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            
            const agora = audioCtx.currentTime;
            if (proximoTempo < agora) proximoTempo = agora + 0.05;
            source.start(proximoTempo);
            proximoTempo += buffer.duration;
        }
    </script>
</body>
</html>
