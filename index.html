<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Final - ESP32-C3</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; }
        .box { background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 10px; border: 1px solid #333; }
        #bar { height: 15px; width: 0%; background: #00ff00; border-radius: 5px; transition: width 0.05s; }
    </style>
</head>
<body>
    <h1>Áudio Realtime (11kHz)</h1>
    <button style="padding:20px;" onclick="iniciar()">CONECTAR</button>
    <div class="box">GPS: <span id="gps">Aguardando...</span></div>
    <div class="box">Botão: <span id="btn">---</span></div>
    <div class="box">Volume:<div style="background:#000; width:100%;"><div id="bar"></div></div></div>

    <script>
        const UUIDS = { srv: "6e400001-b5a3-f393-e0a9-e50e24dcca9e", gps: "6e400002-b5a3-f393-e0a9-e50e24dcca9e", btn: "6e400003-b5a3-f393-e0a9-e50e24dcca9e", aud: "6e400004-b5a3-f393-e0a9-e50e24dcca9e" };
        let audioCtx, proximoTempo = 0;

        async function iniciar() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 11025 });
                const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'ESP32' }], optionalServices: [UUIDS.srv] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UUIDS.srv);

                (await service.getCharacteristic(UUIDS.gps)).startNotifications().then(c => c.addEventListener('characteristicvaluechanged', e => {
                    document.getElementById('gps').innerText = new TextDecoder().decode(e.target.value);
                }));
                (await service.getCharacteristic(UUIDS.btn)).startNotifications().then(c => c.addEventListener('characteristicvaluechanged', e => {
                    document.getElementById('btn').innerText = e.target.value.getUint8(0) ? "PRESS" : "SOLTO";
                }));

                const audChar = await service.getCharacteristic(UUIDS.aud);
                await audChar.startNotifications();
                audChar.addEventListener('characteristicvaluechanged', e => {
                    tocar(new Uint8Array(e.target.value.buffer));
                });
            } catch (v) { alert(v); }
        }

        function tocar(data) {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, data.length, 11025);
            const channel = buffer.getChannelData(0);
            let pico = 0;
            for (let i = 0; i < data.length; i++) {
                channel[i] = ((data[i] - 128) / 128) * 8.0; // Ganho 8x para compensar os 16-bit
                pico += Math.abs(channel[i]);
            }
            document.getElementById('bar').style.width = Math.min((pico/data.length)*200, 100) + "%";

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            
            const agora = audioCtx.currentTime;
            // Buffer de 200ms para evitar o picotado (jitter)
            if (proximoTempo < agora) proximoTempo = agora + 0.2;
            source.start(proximoTempo);
            proximoTempo += buffer.duration;
        }
    </script>
</body>
</html>
