<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEA - Segurança Feminina</title>
    <style>
        :root {
            --pink-primary: #ff4b81;
            --pink-soft: #ffe4ec;
            --white: #ffffff;
            --text-dark: #4a4a4a;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background-color: var(--white);
            border-bottom: 2px solid var(--pink-soft);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--pink-primary);
            letter-spacing: 3px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
            padding: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--pink-soft);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .disconnected { background: #fee2e2; color: #dc2626; }
        .connected { background: #dcfce7; color: #16a34a; }

        .data-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .data-value {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background-color: var(--pink-primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 10px rgba(255, 75, 129, 0.3);
        }

        button:hover {
            background-color: #e63e70;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #btn-log {
            font-family: monospace;
            font-size: 0.9rem;
            background: #fdf2f5;
            padding: 10px;
            border-radius: 10px;
            max-height: 100px;
            overflow-y: auto;
        }

        .footer-text {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SAFEA</div>
        <p style="color: var(--pink-primary); margin: 5px 0 0 0; font-size: 0.9rem;">Proteção em cada clique</p>
    </header>

    <div class="container">
        <button id="connectBtn">CONECTAR DISPOSITIVO</button>

        <div class="card" style="margin-top: 30px;">
            <div id="status" class="status-badge disconnected">Desconectado</div>
            
            <div class="data-label">Localização (GPS)</div>
            <div id="gps-data" class="data-value">Aguardando...</div>

            <div class="data-label">Nível de Bateria</div>
            <div id="batt-data" class="data-value">--%</div>

            <div class="data-label">Última Atividade do Botão</div>
            <div id="btn-log">Nenhum evento detectado.</div>
        </div>

        <div class="card" id="audio-card" style="border-left: 5px solid var(--pink-primary);">
            <div class="data-label">Monitoramento de Áudio</div>
            <div id="audio-status" class="data-value">Inativo</div>
            <canvas id="visualizer" style="width: 100%; height: 60px; background: #fffafb;"></canvas>
        </div>
    </div>

    <div class="footer-text">
        Plataforma SAFEA &copy; 2026<br>
        Sistema de monitoramento de emergência.
    </div>

    <script>
        // Configurações dos UUIDs (Devem ser iguais ao do ESP32)
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UUID_GPS = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const UUID_BTN = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        const UUID_AUDIO = "6e400004-b5a3-f393-e0a9-e50e24dcca9e";
        const UUID_BATT = "6e400005-b5a3-f393-e0a9-e50e24dcca9e";

        let device, server;
        const connectBtn = document.getElementById('connectBtn');
        const statusBadge = document.getElementById('status');

        connectBtn.addEventListener('click', async () => {
            try {
                statusBadge.textContent = "Pareando...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "ESP32-SUPERMINI" }],
                    optionalServices: [SERVICE_UUID]
                });

                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                statusBadge.textContent = "Conectado";
                statusBadge.className = "status-badge connected";
                connectBtn.style.display = "none";

                // Inscrição nas Características
                setupNotification(service, UUID_GPS, (val) => {
                    document.getElementById('gps-data').textContent = new TextDecoder().decode(val);
                });

                setupNotification(service, UUID_BATT, (val) => {
                    document.getElementById('batt-data').textContent = new TextDecoder().decode(val);
                });

                setupNotification(service, UUID_BTN, (val) => {
                    const msg = new TextDecoder().decode(val);
                    const log = document.getElementById('btn-log');
                    const time = new Date().toLocaleTimeString();
                    log.innerHTML = `[${time}] Botão: ${msg}<br>` + log.innerHTML;
                });

                setupNotification(service, UUID_AUDIO, (val) => {
                    handleAudio(val);
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (error) {
                console.log(error);
                statusBadge.textContent = "Erro na Conexão";
                statusBadge.className = "status-badge disconnected";
            }
        });

        async function setupNotification(service, uuid, callback) {
            const char = await service.getCharacteristic(uuid);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (event) => {
                callback(event.target.value);
            });
        }

        function onDisconnected() {
            statusBadge.textContent = "Desconectado";
            statusBadge.className = "status-badge disconnected";
            connectBtn.style.display = "block";
        }

        // Lógica Básica de Áudio (Visualizer)
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        function handleAudio(value) {
            document.getElementById('audio-status').textContent = "GRAVANDO / RECEBENDO";
            document.getElementById('audio-status').style.color = "var(--pink-primary)";
            
            // Desenha um visualizador simples baseado nos bytes recebidos
            const data = new Uint8Array(value.buffer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4b81';
            for (let i = 0; i < data.length; i++) {
                const h = (data[i] / 255) * canvas.height;
                ctx.fillRect(i * (canvas.width / data.length), canvas.height - h, 2, h);
            }
        }
    </script>
</body>
</html>
