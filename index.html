<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Final ESP32-C3</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .box { background: #1e1e1e; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #333; }
        button { background: #007bff; color: white; border: none; padding: 20px; border-radius: 10px; cursor: pointer; }
        #bar { height: 20px; width: 0%; background: #00ff00; transition: width 0.1s; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Validador de Áudio Realtime</h1>
    <button onclick="iniciar()">CONECTAR VIA BLUETOOTH</button>

    <div class="box"><h3>GPS: <span id="gps">---</span></h3></div>
    <div class="box"><h3>Botão: <span id="btn">SOLTO</span></h3></div>
    <div class="box">
        <h3>Volume Microfone</h3>
        <div style="background:#000; width:100%; border-radius:10px;"><div id="bar"></div></div>
    </div>

    <script>
        const UUIDS = {
            srv: "6e400001-b5a3-f393-e0a9-e50e24dcca9e",
            gps: "6e400002-b5a3-f393-e0a9-e50e24dcca9e",
            btn: "6e400003-b5a3-f393-e0a9-e50e24dcca9e",
            aud: "6e400004-b5a3-f393-e0a9-e50e24dcca9e"
        };

        let audioCtx, proximoTempo = 0;

        async function iniciar() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 11025 });
                const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'ESP32' }], optionalServices: [UUIDS.srv] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(UUIDS.srv);

                // GPS & Botão
                (await service.getCharacteristic(UUIDS.gps)).startNotifications().then(c => c.addEventListener('characteristicvaluechanged', e => {
                    document.getElementById('gps').innerText = new TextDecoder().decode(e.target.value);
                }));
                (await service.getCharacteristic(UUIDS.btn)).startNotifications().then(c => c.addEventListener('characteristicvaluechanged', e => {
                    document.getElementById('btn').innerText = e.target.value.getUint8(0) ? "PRESSIONADO" : "SOLTO";
                }));

                // Áudio
                const audChar = await service.getCharacteristic(UUIDS.aud);
                await audChar.startNotifications();
                audChar.addEventListener('characteristicvaluechanged', e => {
                    tocar(new Uint8Array(e.target.value.buffer));
                });
                alert("Conectado!");
            } catch (v) { alert(v); }
        }

        function tocar(data) {
            if (!audioCtx) return;
            const buffer = audioCtx.createBuffer(1, data.length, 11025);
            const channel = buffer.getChannelData(0);
            let p = 0;
            for (let i = 0; i < data.length; i++) {
                channel[i] = ((data[i] - 128) / 128) * 6.0; // Ganho aumentado para clareza
                p += Math.abs(channel[i]);
            }
            document.getElementById('bar').style.width = Math.min((p/data.length)*100, 100) + "%";

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            
            // Sincronização solta para evitar cortes (pipipi)
            const agora = audioCtx.currentTime;
            if (proximoTempo < agora) proximoTempo = agora + 0.05;
            source.start(proximoTempo);
            proximoTempo += buffer.duration;
        }
    </script>
</body>
</html>
