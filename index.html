<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ESP32-C3 Ultra</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .box { background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 10px; border: 1px solid #444; }
        #bar { height: 15px; width: 0%; background: #00ff00; border-radius: 5px; transition: width 0.05s; }
        button { padding: 20px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Painel ESP32-C3</h1>
    <button onclick="conectar()">CONECTAR VIA BLUETOOTH</button>

    <div class="box">GPS: <span id="gps">---</span></div>
    <div class="box">Botão: <span id="btn">SOLTO</span></div>
    <div class="box">Voz:<div style="background:#000; width:100%; margin-top:10px;"><div id="bar"></div></div></div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UUIDS = {
            gps: "6e400002-b5a3-f393-e0a9-e50e24dcca9e",
            btn: "6e400003-b5a3-f393-e0a9-e50e24dcca9e",
            aud: "6e400004-b5a3-f393-e0a9-e50e24dcca9e"
        };

        let audioCtx, proximoTempo = 0;

        async function conectar() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 11025 });
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                const btnChar = await service.getCharacteristic(UUIDS.btn);
                await btnChar.startNotifications();
                btnChar.oncharacteristicvaluechanged = e => {
                    document.getElementById('btn').innerText = e.target.value.getUint8(0) ? "PRESSIONADO" : "SOLTO";
                };

                const audChar = await service.getCharacteristic(UUIDS.aud);
                await audChar.startNotifications();
                audChar.oncharacteristicvaluechanged = e => {
                    tocar(new Uint8Array(e.target.value.buffer));
                };

                const gpsChar = await service.getCharacteristic(UUIDS.gps);
                await gpsChar.startNotifications();
                gpsChar.oncharacteristicvaluechanged = e => {
                    document.getElementById('gps').innerText = new TextDecoder().decode(e.target.value);
                };

                alert("Conectado com Sucesso!");
            } catch (err) { alert(err); }
        }

        function tocar(data) {
    if (!audioCtx) return;
    const samples = data.length;
    const buffer = audioCtx.createBuffer(1, samples, 11025);
    const channel = buffer.getChannelData(0);
    let energia = 0;

    for (let i = 0; i < samples; i++) {
        let v = (data[i] - 128) / 128;
        
        // Suavização nas bordas do buffer (Fade-in/out) para evitar estalos
        if (i < 10) v *= (i / 10); 
        if (i > samples - 10) v *= ((samples - i) / 10);

        channel[i] = v * 3.0; // Ganho moderado
        energia += Math.abs(v);
    }

    const volumeMedio = energia / samples;
    document.getElementById('bar').style.width = Math.min(volumeMedio * 400, 100) + "%";

    // Gate mais "inteligente"
    if (volumeMedio < 0.04) return; 

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    
    // Adiciona um pequeno filtro passa-baixa no próprio navegador para abafar o chiado agudo
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 4000; // Corta ruídos muito agudos (chiado metálico)
    
    source.connect(filter);
    filter.connect(audioCtx.destination);

    const agora = audioCtx.currentTime;
    // Aumentamos o "look-ahead" para 0.06 para dar fôlego ao Bluetooth
    if (proximoTempo < agora) proximoTempo = agora + 0.06;
    
    source.start(proximoTempo);
    proximoTempo += buffer.duration;
}
    </script>
</body>
</html>
