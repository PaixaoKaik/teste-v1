<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ESP32-C3 - Validador Final</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: bold; }
        #statusBtn { font-size: 24px; font-weight: bold; color: #555; }
        .pressionado { color: #00ff00 !important; }
        #visualizer { width: 100%; height: 50px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; position: relative; }
        #bar { height: 100%; width: 0%; background: #00ff00; transition: width 0.1s; }
    </style>
</head>
<body>

    <h1>Validador de Produto</h1>
    <button onclick="conectar()">CONECTAR VIA BLUETOOTH</button>

    <div class="box">
        <h3>📍 Localização GPS</h3>
        <p id="txtGPS">Aguardando dados...</p>
    </div>

    <div class="box">
        <h3>🔘 Status do Botão</h3>
        <div id="statusBtn">SOLTO</div>
    </div>

    <div class="box">
        <h3>🎤 Áudio (Monitor de Voz)</h3>
        <div id="audioStatus" style="color: #888;">Status: Offline</div>
        <div id="visualizer"><div id="bar"></div></div>
    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const GPS_UUID     = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const BOTAO_UUID   = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        const AUDIO_UUID   = "6e400004-b5a3-f393-e0a9-e50e24dcca9e";

        let audioCtx;
        let proximoTempoAudio = 0; 

        async function conectar() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                // GPS
                const gpsChar = await service.getCharacteristic(GPS_UUID);
                gpsChar.startNotifications();
                gpsChar.addEventListener('characteristicvaluechanged', e => {
                    document.getElementById('txtGPS').innerText = new TextDecoder().decode(e.target.value);
                });

                // BOTÃO
                const botChar = await service.getCharacteristic(BOTAO_UUID);
                botChar.startNotifications();
                botChar.addEventListener('characteristicvaluechanged', e => {
                    let valor = e.target.value.getUint8(0);
                    const el = document.getElementById('statusBtn');
                    el.innerText = valor === 1 ? "PRESSIONADO" : "SOLTO";
                    el.className = valor === 1 ? "pressionado" : "";
                });

                // ÁUDIO
                const audioChar = await service.getCharacteristic(AUDIO_UUID);
                await audioChar.startNotifications();
                document.getElementById('audioStatus').innerText = "Status: RECEBENDO ÁUDIO 🔊";
                
                audioChar.addEventListener('characteristicvaluechanged', e => {
                    let rawData = new Uint8Array(e.target.value.buffer);
                    processarSom(rawData);
                });

                alert("Conectado!");
            } catch (err) {
                alert("Erro: " + err);
            }
        }

        function processarSom(data) {
            if (!audioCtx) return;

            // ANTI-ECO: Se o áudio estiver mais de 300ms atrasado, pula para o tempo real
            if (proximoTempoAudio > audioCtx.currentTime + 0.3) {
                proximoTempoAudio = audioCtx.currentTime;
            }

            let buffer = audioCtx.createBuffer(1, data.length, 16000);
            let channelData = buffer.getChannelData(0);
            let somaPico = 0;

            for (let i = 0; i < data.length; i++) {
                // Multiplicador de 5.0 para compensar o filtro digital do ESP
                let s = ((data[i] - 128) / 128.0) * 5.0;
                channelData[i] = s;
                somaPico += Math.abs(s); 
            }

            // Barra visual
            let volume = (somaPico / data.length) * 500;
            document.getElementById('bar').style.width = Math.min(volume, 100) + "%";

            let source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);

            // Sincronismo da fila de pacotes
            if (proximoTempoAudio < audioCtx.currentTime) {
                proximoTempoAudio = audioCtx.currentTime + 0.05; 
            }

            source.start(proximoTempoAudio);
            proximoTempoAudio += buffer.duration;
        }
    </script>
</body>
</html>
